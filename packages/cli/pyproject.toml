[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wikicode-cli"
version = "0.1.0"
description = "WikiCode CLI — generate and maintain codebase documentation from the command line"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["documentation", "codebase", "wiki", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Environment :: Console",
    "Topic :: Software Development :: Documentation",
]
dependencies = [
    "wikicode-core",
    "wikicode-server",
    # CLI framework
    "click>=8.1,<9",
    # Terminal formatting
    "rich>=13,<14",
    # Filesystem watching (for `wikicode watch`)
    "watchdog>=4,<5",
]

[project.scripts]
wikicode = "wikicode.cli.main:cli"

[project.urls]
Homepage = "https://github.com/wikicode-ai/wikicode"
Repository = "https://github.com/wikicode-ai/wikicode"

[tool.hatch.build.targets.wheel]
packages = ["src/wikicode"]

[tool.uv]
package = true

[tool.uv.sources]
wikicode-core = { workspace = true }
wikicode-server = { workspace = true }
